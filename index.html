<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Division Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="calculator">
        <h1>Simple Division</h1>

        <div class="field">
            <label for="firstNumber">First number</label>
            <input id="firstNumber" type="number" placeholder="Enter first number">
        </div>

        <div class="field">
            <label for="secondNumber">Second number</label>
            <input id="secondNumber" type="number" placeholder="Enter second number">
        </div>

        <button id="calculateButton" type="button">Show result</button>
        <p id="result">Result: -</p>
    </main>

    <script type="module" src="index.js"></script>
</body>
</html>
